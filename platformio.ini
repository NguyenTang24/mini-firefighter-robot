; =============================================================
; platformio.ini — FireFighter Robot
; Target: ESP32-WROOM-32 (ESP32 DevKit)
; =============================================================

; ── Shared settings inherited by every environment ───────────
[common]
platform  = espressif32
board     = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
framework = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
upload_speed    = 921600
board_build.partitions = min_spiffs.csv
build_flags =
    ; ESP-IDF log level 3 = INFO (shows ESP32 system messages on Serial)
    -DCORE_DEBUG_LEVEL=3
    ; Strict C++17 — catches type errors early
    -std=gnu++17
lib_deps =
    madhephaestus/ESP32Servo@^0.13.0   ; Servo sweep for TF-Luna 3-zone scan

; Built-in ESP32 Arduino core libraries (no lib_deps entry needed):
;   WebServer.h, WiFi.h, HardwareSerial.h, freertos/*

; ── Production build (all source files) ──────────────────────
; Flash: pio run -e esp32dev -t upload
[env:esp32dev]
extends = common
; (uses entire src/ directory by default)

; ── Test: motors only ────────────────────────────────────────
; Flash: pio run -e test_motors -t upload && pio device monitor
; Cycles every motion primitive + Lab 6 SetVelocity API.
; Verify: watch wheels move through each step; check Serial labels.
[env:test_motors]
extends = common
src_filter = -<src/> +<src/motors.cpp> +<test/test_motors.cpp>

; ── Test: sensors only ───────────────────────────────────────
; Flash: pio run -e test_sensors -t upload && pio device monitor
; Continuous flame + LiDAR reads; 3-zone sweep every 6 s.
; Verify: move hand near flame sensor, point LiDAR at objects.
[env:test_sensors]
extends = common
src_filter = -<src/> +<src/sensors.cpp> +<test/test_sensors.cpp>

; ── Test: suppression (pump) only ────────────────────────────
; Flash: pio run -e test_suppression -t upload && pio device monitor
; Pattern: ON 2 s → OFF 3 s → repeat.
; Verify: hear pump engage/disengage on schedule.
[env:test_suppression]
extends = common
src_filter = -<src/> +<src/suppression.cpp> +<test/test_suppression.cpp>

; ── Test: WiFi HTTP + UDP ─────────────────────────────────────
; Flash: pio run -e test_wifi -t upload && pio device monitor
; Brings up HTTP (:80) and UDP (:8082) with a minimal FSM.
; No motors, LiDAR, or flame sensor — pure network interface test.
; Verify: curl http://<IP>/status   curl http://<IP>/start   etc.
[env:test_wifi]
extends = common
src_filter =
    -<src/>
    +<src/wifi_commander.cpp>
    +<src/state_machine.cpp>
    +<src/motors.cpp>
    +<src/suppression.cpp>
    +<test/test_wifi.cpp>
